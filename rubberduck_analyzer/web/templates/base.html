<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RubberDuck Analyzer{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <nav class="nav" aria-label="Main navigation">
    <span class="nav-brand">RD Analyzer</span>
    <a href="/" id="nav-dashboard">Dashboard</a>
    <a href="/analyze/" id="nav-upload">Upload</a>
    <a href="/sessions/" id="nav-sessions">Sessions</a>
    <a href="/synthesis/" id="nav-synthesis">Synthesis</a>
    <a href="/context/" id="nav-context">Context</a>
  </nav>
  <main id="main-content">
    {% block breadcrumb %}{% endblock %}
    {% block content %}{% endblock %}
  </main>
  <script>
  // Active nav indicator
  (function() {
    const path = window.location.pathname;
    const map = {'/': 'nav-dashboard', '/analyze/': 'nav-upload', '/sessions/': 'nav-sessions', '/synthesis/': 'nav-synthesis', '/context/': 'nav-context'};
    for (const [prefix, id] of Object.entries(map)) {
      if (prefix === '/' ? path === '/' : path.startsWith(prefix)) {
        const el = document.getElementById(id);
        if (el) el.classList.add('active');
      }
    }
  })();
  </script>
</body>
</html>
